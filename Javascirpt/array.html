<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>array</h1>

    <script>
    //    array

    let studentlists = ["John", "Jane", "Jack", "Jill"];
    console.log(studentlists);

    // array.push()
    studentlists.push("Joe");
    console.log(studentlists);

    // array.pop()
    studentlists.pop();
    console.log(studentlists);

    // array.unshift()
    studentlists.unshift("Jasmine");
    console.log(studentlists);
    
    // array.shift()
    studentlists.shift();
    console.log(studentlists);

    // array.sort()
    studentlists.sort();
    console.log(studentlists);
    
    let studentlists2 = ["Zoe", "Adam", "Charlie"]; 


    // array.reverse()
    studentlists2.reverse();
    console.log(studentlists2);

    studentlists2.sort().reverse();
    console.log(studentlists2);

    // array.toString()
    console.log(studentlists.toString());

    // string to array
    let studentlists3 = "John, Jane, Jack, Jill";
    studentListArray =studentlists3.split(", ");
    console.log(studentListArray);

    let array1 = [1, 2, 3];
    let array2 = [4, 5, 6];
    let array3 = [9,10,11,12,];

    let result = array1.concat(array2, array3);
    console.log(result);

    let result2 = [...array1, ...array2, ...array3];
    console.log(result2);
    </script>
</body>
</html>
