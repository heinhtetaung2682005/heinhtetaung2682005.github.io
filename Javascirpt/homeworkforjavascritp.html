<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Homework</h1>
    <script>
      let choice;

while (true) {
    choice = prompt("Choose (+, -, *, /) or q to quit:");

    if (choice === "q") {
        break;
    }

    let num1 = Number(prompt("Enter first number:"));
    let num2 = Number(prompt("Enter second number:"));

    let result;

    switch (choice) {
        case "+":
            result = num1 + num2;
            break;
        case "-":
            result = num1 - num2;
            break;
        case "*":
            result = num1 * num2;
            break;
        case "/":
            result = num1 / num2;
            break;
        default:
            result = "Invalid Operator";
    }

    console.log(num1 + " " + choice + " " + num2 + " = " + result);
}
    </script>
  </body>
</html>
