<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Data Types</h1> 

    <script>
        // string data type 
        // let name = "Hein Htet Aung"; 
        // let name = ,'Hein Htet Aung'; 
        // let name = ,Hein Htet Aung`; 
        let name = "Hein Htet Aung";
        console.log(name);
        console.log(typeof(name));

        // numberic data type 
        let age = 20;
        console.log(age);
        console.log(typeof(age));

        // boolean data type (true or fales) 
        let isStudent = true;
        console.log(isStudent);
        console.log(typeof(isStudent));

        // undefined data type 
        let undefinedVariable;
        console.log(undefinedVariable);
        console.log(typeof (undefinedVariable));

        // null data type 
        let nullVariable = null;
        console.log(nullVariable);
        console.log(typeof (nullVariable));

        // arry data type
        // let studentlist = new Array('Mg Mg','Aung Aung','Hla Hla'); 
        let studentlist = ['Mg Mg','Aung Aung','Hla Hla'];
        console.log(studentlist);
        console.log(typeof(studentlist));
        console.log(studentlist.length);
        console.log(studentlist[2]);

        // object data type
        let student = {
            // key : value 
            name : "Hein Htet Aung" ,
            age : "21",
            address : "Hlaing Thar Yar",
            education : "University of computer (kmd)",
        }
        console.log(student);
        console.log(typeof(student));
        console.log(student.address);


    </script>
</body>
</html>
