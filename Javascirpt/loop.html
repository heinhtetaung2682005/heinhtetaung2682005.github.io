<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>looping</h1>
    <!-- for loop -->
     <!-- for(initialize; condition; increment/decrement) -->
      <script>
        // while loop
        let j = 1;
        while(j < 100){
            document.write('Your Number is While Loop ' + j + '<br>');
            j+=10;

        }

        // do while loop
        let i = 1;
        do {
            document.write(i + "<br>");
            i++;
        } while (i <= 5);
      </script>
</body>
</html>
