<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>looping</h1>
    <!-- for loop -->
     <!-- for(initialize; condition; increment/decrement) -->
      <script>
        for(let i =0;i<3;i++){
           for(let j = 0;j<3;j++){
            document.write('*');
           }
        }
      

        // Reverse star triangle example
        for (let i = 3; i > 0; i--) {
            for (let k = i; k > 0; k--) {
                document.write('*');
            }
            document.write('<br>');
        }
      </script>

</body>
</html>
