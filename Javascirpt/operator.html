<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Operators</h1> 

    <script>
        // arthmetic operator 
        let a = 10;
        let b = 5;
        console.log(a + b); // addition
        console.log(a - b); // subtraction
        console.log(a * b); // multiplication
        console.log(a / b); // division
        console.log(a % b); // modulus

        // assignment operator 
        let c = 20;
        c += 5; // c = c + 5
        console.log(c);
        c -= 5; // c = c - 5
        console.log(c);
        c *= 2; // c = c * 2
        console.log(c);
        c /= 2; // c = c / 2
        console.log(c);

        // exponential operator
        let d = 2;
        console.log(d ** 3); // d raised to the power of 3

        // presendence operator
        let e = 10 + 5 * 2; // multiplication has higher precedence than addition
        console.log(e); // 20
    </script>
</body>
</html>
