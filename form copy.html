<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration</h1>
    <form action="request.php" method="get">
        <label for="name">Name:</label>
        <input type="text" id="name" name="stu_name" >
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="stu_email" >
        <br><br>
        <label for="phone">Phone:</label>
        <input type="number" id="phone" name="phone" >
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="stu_password">
        <br><br>
        <label for="passport">Passport:</label>
        <input type="file" accept=".webp" name="stu_passport" >
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="stu-dob" id="dob">
        <br><br>
       <lable for="Year">Years</label>
        <select name="Year" id="">
            <option value="">Choose Your Year</option>
            <option value="1">First Year</option>
            <option value="2">Second Year</option>
            <option value="3">Third Year</option>
        </select>
        <br></br>
        <label>Gender:</label>

        <br></br>
        <input type="radio" name="gender" value="male" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" value="female" id="female">
        <label for="female">Female</label>
        <input type="radio" name="gender" value="other" id="other">
        <label for="other">Other</label>
        <br><br>
        <label for="hoppy">Hobbies:</label>
        <br></br>
        <input type="checkbox" name="gamming" id="gamming"> <label for="gamming">Gamming</label>
        <input type="checkbox" name="reading" id="reading"> <label for="reading">Reading</label>
        <input type="checkbox" name="travelling" id="travelling"> <label for="travelling">Travelling</label>
        <br></br>
        <label for="address">Address:</label>
        <br></br>
        <textarea name="address" id="address" rows="4" cols="50"></textarea>
        <br><br>
        <input type = "time" name="" id="">
        <input type = "range" min="0" max="100" name="" id="">
        <input type = "color" name="" id="">
        <input type = "text" name="" id="" required>
        <input type = "text" name="city1" id="" value="Mandalay">
        <input type = "text" name="city2" id="" value="Yangon" readonly>
        <input type = "text" name="plac" id="" placeholder="e.g. Mandalay">
        <br></br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
