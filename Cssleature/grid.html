<body>
    <h1>grid Lessons</h1>
<div class="grid">
    <div class="grid_child" style="background-color: red;">1</div>

    <div class="grid_child" style="background-color: rgb(0, 42, 255);">3</div>

    <div class="grid_child" style="background-color: rgb(0, 64, 255);">5</div>
    <div class="grid_child" style="background-color: rgb(255, 0, 174);">6</div>
    <div class="grid_child" style="background-color: red;">7</div>
    <div class="grid_child"  style="background-color: rgb(251, 255, 0);">8</div>

    </div>
    <br>
    <h1>grid row add</h1>
<div class="grid">
    <div class="grid_child" style="background-color: red;">1</div>

    <div class="grid_child" style="background-color: rgb(0, 42, 255);">3</div>

    <div class="grid_child"  style="background-color: rgb(251, 255, 0);">8</div>
    <div class="grid_child" style="background-color: red;">9</div>
</div>
    <h1>grid colum add</h1>
<div class="grid">
    <div class="grid_child" style="background-color: red;">1</div>

    <div class="grid_child" style="background-color: rgb(204, 0, 255);">4</div>
    <div class="grid_child" style="background-color: rgb(0, 64, 255);">5</div>
    <div class="grid_child" style="background-color: rgb(255, 0, 174);">6</div>
